<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier Invitaciones</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #0b0b0b;
  --text: #f3f3f3;
  --soft: #a0a0a0;
  --accent: #c6b7a6;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 40px 24px;
  overflow: hidden;
}

/* Fondo con movimiento ultra sutil */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 25% 30%, rgba(255,255,255,0.04), transparent 55%),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.03), transparent 55%);
  animation: breathe 14s ease-in-out infinite alternate;
  z-index: -1;
}

@keyframes breathe {
  from { transform: scale(1); opacity: 0.8; }
  to { transform: scale(1.05); opacity: 1; }
}

.container {
  max-width: 640px;
}

/* Primera frase */
.intro {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Mensaje principal */
.message {
  margin-top: 50px;
  font-size: 17px;
  line-height: 1.9;
  color: var(--soft);
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 2.5s;
}

/* Línea dorada */
.line {
  width: 70px;
  height: 1px;
  background: var(--accent);
  margin: 60px auto 0 auto;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 5s;
}

/* Nota final */
.signature {
  margin-top: 30px;
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 6.5s;
}

/* Mobile */
@media (max-width: 600px) {

  .intro {
    font-size: 26px;
  }

  .message {
    font-size: 15px;
    margin-top: 35px;
  }

}

</style>

<script>
// Redirección elegante después de 11 segundos
setTimeout(function() {
  window.location.href = "https://atelierinvitaciones.com/";
}, 11000);
</script>

</head>

<body>

<div class="container">

<div class="intro">
La historia comienza aquí.
</div>

<div class="message">
Recibimos su información correctamente.<br><br>
A partir de este momento iniciamos el proceso de dirección creativa,<br>
donde cada detalle será pensado con intención y sensibilidad.<br><br>
Gracias por confiar en Atelier.
</div>

<div class="line"></div>

<div class="signature">
ATELIER INVITACIONES
</div>

</div>

</body>
</html>
